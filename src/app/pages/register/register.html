<div class="min-h-screen bg-gray-950 flex items-center justify-center">
    <div class="bg-gray-900 p-8 rounded-2xl w-full max-w-md shadow-xl">
      <h1 class="text-white text-3xl font-bold mb-2">Create Account</h1>
      <p class="text-gray-400 mb-8">Join Freelance CRM</p>
  
      <div class="mb-4">
        <label class="text-gray-400 text-sm mb-1 block">Email</label>
        <input
          type="email"
          [(ngModel)]="email"
          placeholder="you@example.com"
          class="w-full bg-gray-800 text-white rounded-lg px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500"/>
      </div>
  
      <div class="mb-6">
        <label class="text-gray-400 text-sm mb-1 block">Password</label>
        <input
          type="password"
          [(ngModel)]="password"
          placeholder="••••••••"
          class="w-full bg-gray-800 text-white rounded-lg px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500"/>
      </div>
  
      @if (error) {
        <p class="text-red-400 text-sm mb-4">{{ error }}</p>
      }
  
      @if (success) {
        <p class="text-green-400 text-sm mb-4">{{ success }}</p>
      }
  
      <button (click)="register()"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition mb-4">
        Create Account
      </button>
  
      <p class="text-gray-400 text-sm text-center">
        Already have an account?
        <a routerLink="/login" class="text-blue-400 hover:text-blue-300">Sign In</a>
      </p>
    </div>
  </div>
